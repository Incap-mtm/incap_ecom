extend type Setting {
  storeWhatsappNumber: String
  googleMapsKey: String
  storeInstagram: String
  storeFacebook: String
  storeLinkedin: String
  storeTiktok: String
  storeYoutube: String
  variantSizeOrder: String
  quienesSomos: String
  blogIndex: String
  catalogUrl: String
  catalogButtonText: String
  leadEmails: String
  featuredProducts: String
  familyCovers: String
}

type SizeOption {
  id: Int!
  text: String!
}

type HomeBlogPost {
  slug: String
  title: String
  excerpt: String
  cover: String
  date: String
  tag: String
}

extend type Query {
  sizeOptions: [SizeOption]
  featuredProductsSelected: [Product]
  homeBlogPosts(limit: Int): [HomeBlogPost]
}
